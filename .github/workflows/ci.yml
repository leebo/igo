name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Go Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: igo_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: igo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d igo_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        env:
          IGO_TEST_MYSQL_DSN: root:root@tcp(127.0.0.1:3306)/igo_test?parseTime=true
          IGO_TEST_POSTGRES_DSN: host=127.0.0.1 user=postgres password=postgres dbname=igo_test port=5432 sslmode=disable
        run: go test ./...
